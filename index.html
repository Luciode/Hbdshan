<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Be My Valentine 💖</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #ff9a9e, #fecfef);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        text-align: center;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 500px;
        position: relative;
    }

    h1 {
        margin-bottom: 30px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px;
        transition: all 0.3s ease;
    }

    #yesBtn {
        background-color: #ff4d6d;
        color: white;
    }

    #noBtn {
        background-color: #aaa;
        color: white;
    }

    .celebrate {
        animation: pop 0.6s ease forwards;
    }

    @keyframes pop {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background: red;
        animation: fall 3s linear infinite;
    }

    @keyframes fall {
        0% { transform: translateY(-100vh) rotate(0deg); }
        100% { transform: translateY(100vh) rotate(720deg); }
    }

    .reasons {
        max-height: 300px;
        overflow-y: auto;
        text-align: left;
        margin-top: 20px;
        font-size: 14px;
    }
 .modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;

    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease;
}

.modal.show {
    opacity: 1;
    visibility: visible;
}

.modal-content {
    background: white;
    padding: 20px;
    border-radius: 20px;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    text-align: center;
}

</style>
</head>
<body>

<div class="container" id="main">
    <h1>Will You Be My Valentine? 💕</h1>
    <button id="yesBtn">YES 💖</button>
    <button id="noBtn">No 😢</button>
</div>

<script>
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let scale = 1;

noBtn.addEventListener("click", () => {
    scale += 0.2;
    yesBtn.style.transform = `scale(${scale})`;
});

yesBtn.addEventListener("click", () => {
    document.body.style.background = "linear-gradient(135deg, #ff4d6d, #ff85a1)";
    
    document.getElementById("main").innerHTML = `
        <h1 class="celebrate">SHE SAID YES 😍💖</h1>
        <div style="font-size:100px;">🥰💘</div>
        <h2>You’re My Valentine Forever 💕</h2>

        <div class="reasons">
            ${generateReasons()}
        </div>

        <button onclick="openGallery()" style="margin-top:20px;">
            View Our Memories 📸
        </button>
    `;

    launchConfetti();
    launchHearts();
});
function openGallery() {
    document.getElementById("galleryModal").classList.add("show");
}

function closeGallery() {
    document.getElementById("galleryModal").classList.remove("show");
}

function generateReasons() {
    const reasons = [
        "You make even boring days fun.",
        "You’re way too competitive but I love it.",
        "I love your laugh.",
        "I love how i feel comfortable around you.",
        "I love how you believe in me.",
        "I love your laugh",
        "I love how you’re secretly soft (even if you act tough ;P)",
        "I love how excited you get when you're happy",
        "I love your humor",
        "I love how you’re my favorite person to talk to.",
        "I love that you make games more fun.",
        "I love that you care about us.",
        "I love your eyes",
        "I love how you make me want to be better.",
        "I love that you’re strong",
        "I love that you’re smart",
        "I love that you have goals",
        "I love how You make me feel chosen",
        "I love that you listen like a good girl",
        "I love your voice",
        "I love that i can trust you",
        "I love that you open up to me.",
        "I love that you’re beautiful.",
        "I love how adorable you get when talking about inrests",
        "I love that you’re my best friend.",
        "I love that i get excited to talk to you",
        "I love that i smile when i think about you",
        "I love that you care.",
        "I love that you support my goals.",
        "I love your voice",
        "I love the memories we've made.",
        "I love that you’re my favorite notification.",
        "I love that you make the late nights better.",
        "I love how you listen to daddy ;).",
        "I love how pretty you are.",
        "I love how silly you are",
        "I love how cute you are.",
        "I love how comfortable i feel around you",
        "I love that you let me be myself (sometimes ;P).",
        "I love that you dont judge me (soemtimes ;P)",
        "I love that you're thoughtful",
        "I love the way you maon for me",
        "I love our little moments",
        "I love that you inspire me",
        "I love that you feel like home.",
        "I love thinking about our exciting future",
        "I love that you're my peace.",
        "I love that you're my favorite person.",
        "I love that you love me.",
        "I love that you’re you. And that’s everything."
    ];

    let list = "<ol>";
    reasons.forEach(reason => {
        list += `<li>${reason} 💕</li>`;
    });
    list += "</ol>";
    return list;
}

function launchConfetti() {
    for(let i = 0; i < 100; i++){
        let confetti = document.createElement("div");
        confetti.classList.add("confetti");
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.backgroundColor = 
            ["#ff4d6d","#ff85a1","#ff99c8","#ffc2d1","#ffe5ec"]
            [Math.floor(Math.random()*5)];
        confetti.style.animationDuration = (Math.random()*3+2)+"s";
        document.body.appendChild(confetti);
    }
}
function launchHearts() {
    for(let i = 0; i < 40; i++){
        let heart = document.createElement("div");
        heart.innerHTML = "💖";
        heart.style.position = "absolute";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = "100vh";
        heart.style.fontSize = (Math.random() * 20 + 20) + "px";
        heart.style.animation = `floatUp ${Math.random()*3+3}s linear forwards`;
        document.body.appendChild(heart);
    }
}
</script>
<div id="galleryModal" class="modal hidden">
    <div class="modal-content">
        <span onclick="closeGallery()" class="close">&times;</span>
        <h2>Our Favorite Memories 💖</h2>
        <img src="images/pic1.jpg" class="memory">
        <img src="images/pic2.jpg" class="memory">
        <video controls class="memory">
            <source src="images/clip1.mp4" type="video/mp4">
        </video>
    </div>
</div>
</body>
</html>
