<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday 🎂</title>
<style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #89f7fe, #fddb92);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        overflow: hidden;
        text-align: center;
    }

    .container {
        background: white;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        max-width: 500px;
        position: relative;
    }

    h1 {
        margin-bottom: 30px;
    }

    button {
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        cursor: pointer;
        margin: 10px;
        transition: all 0.3s ease;
    }

    #yesBtn {
        background-color: #ffcc00;
        color: white;
    }

    #noBtn {
        background-color: #aaa;
        color: white;
    }

    .celebrate {
        animation: pop 0.6s ease forwards;
    }

    @keyframes pop {
        0% { transform: scale(0.5); opacity: 0; }
        100% { transform: scale(1); opacity: 1; }
    }

    .confetti {
        position: absolute;
        width: 10px;
        height: 10px;
        background: red;
        animation: fall 3s linear infinite;
    }

    @keyframes fall {
        0% { transform: translateY(-100vh) rotate(0deg); }
        100% { transform: translateY(100vh) rotate(720deg); }
    }

    .reasons {
        max-height: 300px;
        overflow-y: auto;
        text-align: left;
        margin-top: 20px;
        font-size: 14px;
    }
 .modal {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.8);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;

    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease;
}

.modal.show {
    opacity: 1;
    visibility: visible;
}

.modal-content {
    background: white;
    padding: 20px;
    border-radius: 20px;
    max-width: 600px;
    max-height: 80vh;
    overflow-y: auto;
    text-align: center;
}
.memory {
    width: 100%;
    max-width: 500px;
    height: auto;
    margin: 15px 0;
    border-radius: 15px;
}

</style>
</head>
<body>

<div class="container" id="main">
    <h1>Do you want to open your birthday surprise? 🎂</h1>
    <button id="yesBtn">Open it 🎁</button>
    <button id="noBtn">Not yet 😜</button>
</div>

<script>
let yesBtn = document.getElementById("yesBtn");
let noBtn = document.getElementById("noBtn");
let scale = 1;

noBtn.addEventListener("click", () => {
    scale += 0.2;
    yesBtn.style.transform = `scale(${scale})`;
});

yesBtn.addEventListener("click", () => {
    document.body.style.background = "linear-gradient(135deg, #ffcc00, #ff6b6b)";

    document.getElementById("main").innerHTML = `
        <h1 class="celebrate">HAPPY BIRTHDAY 🎉</h1>
        <div style="font-size:100px;">🎂🎉🎁</div>
        <h2>I made this for you ❤️</h2>

        <div class="reasons">
            ${generateReasons()}
        </div>

        <button id="galleryBtn" style="margin-top:20px;">My Fav Pics <3 📸</button>
        <button id="birthdayCelebsBtn" style="margin-top:10px;">People You Share a Birthday With 🌟</button>
    `;

    // Add event listeners for new buttons
    document.getElementById("galleryBtn").addEventListener("click", openGallery);
    document.getElementById("birthdayCelebsBtn").addEventListener("click", openBirthdayCelebs);

    // Play music sequence
    playBirthdayAudioSequence();

    // Visual effects
    launchConfetti();
    launchHearts();
});
function openGallery() {
    document.getElementById("galleryModal").classList.add("show");
}

function closeGallery() {
    document.getElementById("galleryModal").classList.remove("show");
}

    let list = "<ol>";

}

// Gallery modal
function openGallery() {
    document.getElementById("galleryModal").classList.add("show");
}

function closeGallery() {
    document.getElementById("galleryModal").classList.remove("show");
}

// Birthday Celebs modal
function openBirthdayCelebs() {
    document.getElementById("celebModal").classList.add("show");
}

function closeCelebs() {
    document.getElementById("celebModal").classList.remove("show");
}

// Audio sequence
function playBirthdayAudioSequence() {
    let audio1 = document.getElementById("audio1");
    let audio2 = document.getElementById("audio2");

    audio1.play();
    audio1.onended = () => {
        audio2.play();
    };
}

// Confetti & hearts
function launchConfetti() { /* your existing code */ }
function launchHearts() { /* your existing code */ }

// Click outside modals to close
window.addEventListener("click", function(e) {
    const gallery = document.getElementById("galleryModal");
    const celebs = document.getElementById("celebModal");

    if (e.target === gallery) gallery.classList.remove("show");
    if (e.target === celebs) celebs.classList.remove("show");
});
</script>
<div id="galleryModal" class="modal hidden">
    <div class="modal-content">
        <span onclick="closeGallery()" class="close">&times;</span>
        <h2>My fav pics 💖</h2>
        <img src="images/image.png" class="memory">
        <img src="images/image1.png" class="memory">
        <img src="images/image2.png" class="memory">
        <img src="images/image3.png" class="memory">

<div id="celebModal" class="modal">
    <div class="modal-content">
        <span onclick="closeCelebs()" class="close">&times;</span>
        <h2>Famous People Who Share Your Birthday 🌟</h2>

        <p>🎤 Maddison Beer</p>
        <p>🎬 Matt Lucas</p>
        <p>🎬 Eva Mendes</p>

        <p style="margin-top:20px;">And the most important one... YOU ❤️</p>

</div>
<audio id="audio1" src="audio/audio1.mp3"></audio>
<audio id="audio2" src="audio/audio2.mp3"></audio>
</body>
</html>
